services:
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ./user-service/.env

  food-service:
    build:
      context: ./food-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - ./food-service/.env

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    env_file:
      - ./order-service/.env
  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8084:8084"
    env_file:
      - ./payment-service/.env
    depends_on:
      - order-service